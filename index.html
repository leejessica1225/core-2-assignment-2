<!DOCTYPE html>
<html>
<head>
  <title>Progress Example</title>
</head>
<body>

<p>processing...</p>

<progress id="bar" value="0" max="100"></progress>

<script>
  let progress = document.getElementById("bar");
  let value = 0;

  function fillBar() {
    if (value < 100) {
      value++;
      progress.value = value;
      setTimeout(fillBar, 30);
    }
  }

  fillBar();
</script>
  
<head>
  <title>Simple Search</title>
  <style>
    body {
      text-align: center;
      margin-top: 100px;
      font-family: Arial, sans-serif;
    }

    input {
      width: 250px;
      height: 35px;
      font-size: 16px;
      padding-left: 10px;
    }

    button {
      height: 40px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h2>Search</h2>

  <input type="text" placeholder="Search...">
  <button>Search</button>

</body>
</html>
