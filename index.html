<!DOCTYPE html>
<html>
<head>
  <title>Progress Example</title>
</head>
<body>

<p>processing...</p>

<progress id="bar" value="0" max="100"></progress>

<script>
  let progress = document.getElementById("bar");
  let value = 0;

  function fillBar() {
    if (value < 100) {
      value++;
      progress.value = value;
      setTimeout(fillBar, 30);
    }
  }

  fillBar();
</script>
  
<head>
  <title>Simple Search</title>
  <style>
    body {
      text-align: center;

  </head>
<body>

  <h2>Image Slider</h2>

  <button onclick="prev()">⬅️</button>

  <img id="photo" src="https://picsum.photos/300/200?1">

  <button onclick="next()">➡️</button>

  <script>
    let images = [
      "https://picsum.photos/300/200?1",
      "https://picsum.photos/300/200?2",
      "https://picsum.photos/300/200?3"
    ];

    let index = 0;

    function next() {
      index++;
      if (index > 2) {
        index = 0;
      }
      document.getElementById("photo").src = images[index];
    }

    function prev() {
      index--;
      if (index < 0) {
        index = 2;
      }
      document.getElementById("photo").src = images[index];
    }
  </script>

<body id="bg" style="text-align:center; margin-top:100px;">

<button onclick="one()">1</button>
<button onclick="two()">2</button>
<button onclick="three()">3</button>

<script>
  function one() {
    document.getElementById("bg").style.background = "lightblue";
  }

  function two() {
    document.getElementById("bg").style.background = "lightgreen";
  }

  function three() {
    document.getElementById("bg").style.background = "pink";
  }
</script>


</body>
</html>
